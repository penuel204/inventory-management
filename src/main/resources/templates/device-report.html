<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Device Report</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        .header { background: #003366; color: white; padding: 15px 30px; }
        .nav { background: #002244; padding: 10px 30px; display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; }
        .nav a:hover { background: #003366; }
        .container { padding: 30px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; background: #003366; color: white; margin-right: 10px; }
        .btn-print { background: #28a745; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #003366; color: white; }
        .report-header { margin-bottom: 20px; }
        .report-header h2 { color: #003366; margin-bottom: 5px; }
        .category-title { background: #e9ecef; padding: 10px; margin-top: 20px; font-weight: bold; color: #003366; }
        .status-badge { padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .status-Available { background: #28a745; color: white; }
        .status-Assigned { background: #ffc107; color: #333; }
        .status-Under_Repair { background: #dc3545; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📊 Device Report</h1>
    </div>
    
    <div class="nav">
        <a href="/">📊 Dashboard</a>
        <a href="/devices">💻 Devices</a>
        <a href="/employees">👥 Employees</a>
        <a href="/assignments">📋 Assignments</a>
        <a href="/reports">📈 Reports</a>
        <a href="/audit">🔍 Audit Trail</a>
    </div>
    
    <div class="container">
        <div class="report-header">
            <h2 th:text="${reportTitle}">Device Report</h2>
            <p>Generated on: <span th:text="${#temporals.format(#temporals.createNow(), 'yyyy-MM-dd HH:mm:ss')}"></span></p>
        </div>
        
        <div>
            <button onclick="window.print()" class="btn btn-print">🖨️ Print</button>
            <a href="/reports" class="btn">↩️ Back</a>
        </div>
        
        <div th:each="entry : ${report}">
            <div class="category-title" th:text="'📁 ' + ${entry.key} + ' (' + ${#lists.size(entry.value)} + ' devices)'"></div>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Serial No</th>
                        <th>Make</th>
                        <th>Model</th>
                        <th>Condition</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="device : ${entry.value}">
                        <td th:text="${device.id}">-</td>
                        <td th:text="${device.serialNumber}">-</td>
                        <td th:text="${device.make}">-</td>
                        <td th:text="${device.model}">-</td>
                        <td><span class="status-badge" th:text="${device.deviceCondition}"></span></td>
                        <td><span class="status-badge" th:class="'status-badge status-' + ${device.status?.replace(' ', '_')}" th:text="${device.status}"></span></td>
                    </tr>
                    <tr th:if="${entry.value.empty}">
                        <td colspan="6" style="text-align: center;">No devices in this category</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
