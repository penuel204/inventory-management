<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Employee Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        .header { background: #003366; color: white; padding: 15px 30px; }
        .nav { background: #002244; padding: 10px 30px; display: flex; gap: 20px; }
        .nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; }
        .nav a:hover { background: #003366; }
        .container { max-width: 600px; margin: 30px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #003366; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-right: 10px; }
        .btn-primary { background: #003366; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:text="${pageTitle}">Employee Form</h1>
    </div>
    
    <div class="nav">
        <a href="/">📊 Dashboard</a>
        <a href="/devices">💻 Devices</a>
        <a href="/employees">👥 Employees</a>
        <a href="/assignments">📋 Assignments</a>
    </div>
    
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        
        <form th:action="${employee.id != null ? '/employees/update/' + employee.id : '/employees/save'}" 
              th:object="${employee}" method="post">
            
            <input type="hidden" th:field="*{id}">
            
            <div class="form-group">
                <label>Employee Code *</label>
                <input type="text" th:field="*{employeeCode}" required>
            </div>
            
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" th:field="*{fullName}" required>
            </div>
            
            <div class="form-group">
                <label>Department *</label>
                <input type="text" th:field="*{department}" required>
            </div>
            
            <div class="form-group">
                <label>Role</label>
                <input type="text" th:field="*{role}">
            </div>
            
            <div class="form-group">
                <label>Email</label>
                <input type="email" th:field="*{email}">
            </div>
            
            <div class="form-group">
                <label>Phone Number</label>
                <input type="text" th:field="*{phoneNumber}">
            </div>
            
            <button type="submit" class="btn btn-primary">💾 Save Employee</button>
            <a href="/employees" class="btn btn-secondary">↩️ Cancel</a>
        </form>
    </div>
</body>
</html>
