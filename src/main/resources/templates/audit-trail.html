<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Audit Trail - Airtel Inventory</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        .header { background: #003366; color: white; padding: 15px 30px; }
        .nav { background: #002244; padding: 10px 30px; display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; }
        .nav a:hover { background: #003366; }
        .container { padding: 30px; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; background: #003366; color: white; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #003366; color: white; }
        .badge-create { background: #28a745; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .badge-update { background: #ffc107; color: #333; padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .badge-delete { background: #dc3545; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .badge-assign { background: #17a2b8; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .badge-return { background: #6c757d; color: white; padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔍 Audit Trail</h1>
    </div>
    
    <div class="nav">
        <a href="/">📊 Dashboard</a>
        <a href="/devices">💻 Devices</a>
        <a href="/employees">👥 Employees</a>
        <a href="/assignments">📋 Assignments</a>
        <a href="/reports">📈 Reports</a>
        <a href="/audit">🔍 Audit Trail</a>
    </div>
    
    <div class="container">
        <h2>System Audit Trail</h2>
        
        <div class="search-bar">
            <form action="/audit/search" method="get" style="flex: 1; display: flex; gap: 10px;">
                <input type="text" name="keyword" placeholder="Search by action, entity, or user..." th:value="${searchKeyword}">
                <button type="submit" class="btn">🔍 Search</button>
            </form>
            <a href="/audit" class="btn">🔄 Reset</a>
        </div>
        
        <table>
            <thead>
                <tr>
                    <th>Timestamp</th>
                    <th>Action</th>
                    <th>Entity</th>
                    <th>ID</th>
                    <th>User</th>
                    <th>Old Value</th>
                    <th>New Value</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="log : ${logs}">
                    <td th:text="${#temporals.format(log.timestamp, 'yyyy-MM-dd HH:mm:ss')}">-</td>
                    <td>
                        <span th:if="${log.action == 'CREATE'}" class="badge-create" th:text="${log.action}"></span>
                        <span th:if="${log.action == 'UPDATE'}" class="badge-update" th:text="${log.action}"></span>
                        <span th:if="${log.action == 'DELETE'}" class="badge-delete" th:text="${log.action}"></span>
                        <span th:if="${log.action == 'ASSIGN'}" class="badge-assign" th:text="${log.action}"></span>
                        <span th:if="${log.action == 'RETURN'}" class="badge-return" th:text="${log.action}"></span>
                        <span th:if="${log.action != 'CREATE' and log.action != 'UPDATE' and log.action != 'DELETE' and log.action != 'ASSIGN' and log.action != 'RETURN'}" th:text="${log.action}"></span>
                    </td>
                    <td th:text="${log.entityType}">-</td>
                    <td th:text="${log.entityId}">-</td>
                    <td th:text="${log.performedBy}">-</td>
                    <td th:text="${log.oldValue}">-</td>
                    <td th:text="${log.newValue}">-</td>
                </tr>
                <tr th:if="${logs.empty}">
                    <td colspan="7" style="text-align: center;">No audit records found.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
