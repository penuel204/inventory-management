<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Device Form</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        .header { background: #003366; color: white; padding: 15px 30px; }
        .nav { background: #002244; padding: 10px 30px; display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; }
        .nav a:hover { background: #003366; }
        .container { max-width: 800px; margin: 30px auto; padding: 20px; background: white; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h2 { color: #003366; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; margin-right: 10px; }
        .btn-primary { background: #003366; color: white; }
        .btn-secondary { background: #6c757d; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:text="${pageTitle}">Device Form</h1>
    </div>
    
    <div class="nav">
        <a href="/">📊 Dashboard</a>
        <a href="/devices">💻 Devices</a>
        <a href="/employees">👥 Employees</a>
        <a href="/assignments">📋 Assignments</a>
    </div>
    
    <div class="container">
        <h2 th:text="${pageTitle}"></h2>
        
        <form th:action="${device.id != null ? '/devices/update/' + device.id : '/devices/save'}" 
              th:object="${device}" method="post">
            
            <input type="hidden" th:field="*{id}">
            
            <div class="form-row">
                <div class="form-group">
                    <label>Serial Number *</label>
                    <input type="text" th:field="*{serialNumber}" required>
                </div>
                <div class="form-group">
                    <label>Device Type *</label>
                    <select th:field="*{deviceType}" required>
                        <option value="">Select</option>
                        <option value="Laptop">💻 Laptop</option>
                        <option value="Desktop">🖥️ Desktop</option>
                        <option value="Mobile">📱 Mobile</option>
                    </select>
                </div>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Make/Brand *</label>
                    <input type="text" th:field="*{make}" required>
                </div>
                <div class="form-group">
                    <label>Model *</label>
                    <input type="text" th:field="*{model}" required>
                </div>
            </div>
            
            <div class="form-group">
                <label>Specifications</label>
                <textarea th:field="*{specifications}" rows="3" placeholder="RAM, Storage, Processor, OS..."></textarea>
            </div>
            
            <div class="form-row">
                <div class="form-group">
                    <label>Condition</label>
                    <select th:field="*{deviceCondition}">
                        <option value="New">✨ New</option>
                        <option value="Good">👍 Good</option>
                        <option value="Fair">⚠️ Fair</option>
                        <option value="Damaged">🔧 Damaged</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Status</label>
                    <select th:field="*{status}">
                        <option value="Available">✅ Available</option>
                        <option value="Assigned">👤 Assigned</option>
                        <option value="Under Repair">🔨 Under Repair</option>
                    </select>
                </div>
            </div>
            
            <div class="form-group">
                <label>Purchase Date</label>
                <input type="date" th:field="*{purchaseDate}">
            </div>
            
            <button type="submit" class="btn btn-primary">💾 Save Device</button>
            <a href="/devices" class="btn btn-secondary">↩️ Cancel</a>
        </form>
    </div>
</body>
</html>
