<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Device Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f5f5f5; }
        .header { background: #003366; color: white; padding: 15px 30px; }
        .nav { background: #002244; padding: 10px 30px; display: flex; gap: 20px; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; padding: 8px 15px; border-radius: 5px; }
        .nav a:hover { background: #003366; }
        .container { padding: 30px; }
        .message { padding: 10px 15px; border-radius: 5px; margin-bottom: 20px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .search-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
        .search-bar input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; display: inline-block; }
        .btn-primary { background: #003366; color: white; }
        .btn-warning { background: #ffc107; color: #333; }
        .btn-danger { background: #dc3545; color: white; }
        .btn-info { background: #17a2b8; color: white; }
        .btn-sm { padding: 5px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #003366; color: white; }
        .status-badge { padding: 3px 8px; border-radius: 3px; font-size: 12px; display: inline-block; }
        .status-Available { background: #28a745; color: white; }
        .status-Assigned { background: #ffc107; color: #333; }
        .status-Under_Repair { background: #dc3545; color: white; }
        .form-container { background: white; padding: 20px; border-radius: 10px; margin-bottom: 30px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; }
        .form-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>💻 Device Management</h1>
    </div>
    
    <div class="nav">
        <a href="/">📊 Dashboard</a>
        <a href="/devices">💻 Devices</a>
        <a href="/employees">👥 Employees</a>
        <a href="/assignments">📋 Assignments</a>
        <a href="/reports">📈 Reports</a>
        <a href="/audit">🔍 Audit Trail</a>
    </div>
    
    <div class="container">
        <div th:if="${success}" class="message success" th:text="${success}"></div>
        <div th:if="${error}" class="message error" th:text="${error}"></div>
        
        <!-- Add Device Form -->
        <div class="form-container">
            <h3>➕ Add New Device</h3>
            <form action="/devices/save" method="post" th:object="${newDevice}">
                <div class="form-row">
                    <div class="form-group">
                        <label>Serial Number *</label>
                        <input type="text" name="serialNumber" required>
                    </div>
                    <div class="form-group">
                        <label>Device Type *</label>
                        <select name="deviceType" required>
                            <option value="">Select</option>
                            <option value="Laptop">💻 Laptop</option>
                            <option value="Desktop">🖥️ Desktop</option>
                            <option value="Mobile">📱 Mobile</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Make/Brand *</label>
                        <input type="text" name="make" required>
                    </div>
                    <div class="form-group">
                        <label>Model *</label>
                        <input type="text" name="model" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Specifications</label>
                        <textarea name="specifications" rows="2" placeholder="RAM, Storage, Processor..."></textarea>
                    </div>
                    <div class="form-group">
                        <label>Purchase Date</label>
                        <input type="date" name="purchaseDate">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Condition</label>
                        <select name="deviceCondition">
                            <option value="New">✨ New</option>
                            <option value="Good">👍 Good</option>
                            <option value="Fair">⚠️ Fair</option>
                            <option value="Damaged">🔧 Damaged</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select name="status">
                            <option value="Available">✅ Available</option>
                            <option value="Assigned">👤 Assigned</option>
                            <option value="Under Repair">🔨 Under Repair</option>
                        </select>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">💾 Save Device</button>
            </form>
        </div>
        
        <!-- Search & Filter -->
        <div class="search-bar">
            <form action="/devices/search" method="get" style="flex: 1; display: flex; gap: 10px;">
                <input type="text" name="keyword" placeholder="Search by serial, make, or model..." th:value="${searchKeyword}">
                <button type="submit" class="btn btn-primary">🔍 Search</button>
            </form>
            <a href="/devices" class="btn btn-info">🔄 Reset</a>
        </div>
        
        <!-- Devices Table -->
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Serial No</th>
                    <th>Type</th>
                    <th>Make</th>
                    <th>Model</th>
                    <th>Specs</th>
                    <th>Condition</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="device : ${devices}">
                    <td th:text="${device.id}">-</td>
                    <td th:text="${device.serialNumber}">-</td>
                    <td th:text="${device.deviceType}">-</td>
                    <td th:text="${device.make}">-</td>
                    <td th:text="${device.model}">-</td>
                    <td th:text="${device.specifications}">-</td>
                    <td><span class="status-badge" th:text="${device.deviceCondition}"></span></td>
                    <td><span class="status-badge" th:class="'status-badge status-' + ${device.status?.replace(' ', '_')}" th:text="${device.status}"></span></td>
                    <td>
                        <a th:href="@{/devices/view/{id}(id=${device.id})}" class="btn btn-info btn-sm">View</a>
                        <a th:href="@{/devices/edit/{id}(id=${device.id})}" class="btn btn-warning btn-sm">Edit</a>
                        <a th:href="@{/devices/delete/{id}(id=${device.id})}" class="btn btn-danger btn-sm" onclick="return confirm('Delete this device?')">Delete</a>
                    </td>
                </tr>
                <tr th:if="${devices.empty}">
                    <td colspan="9" style="text-align: center;">No devices found. Add your first device above.</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
